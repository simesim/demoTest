            background: #1e2937;

        }

        .code {
            font-family: 'Courier New', monospace;
            background: #0f172a;
            border: 2px solid #00fa9a;

            background: #1e2937;
            color: #e2e8f0;
            border: 2px solid #00fa9a;

</head>

        public Login() => InitializeComponent(); // Конструктор формы. Вызывает метод, созданный дизайнером Visual Studio

        private void Login_Load(object sender, EventArgs e)
        {
            // При загрузке формы сразу заполняем DataSet данными из таблицы Users (нужно для авторизации)
            usersTableAdapter.Fill(obuvDBDataSet.Users);
        }

        private void btnEnter_Click(object sender, EventArgs e)
        {
            try
            {
                // Выполняем запрос к базе данных: ищем пользователя по логину и паролю
                var dt = usersTableAdapter.GetDataByLogPass(tbLogin.Text, tbPass.Text);

                if (dt.Count == 0) // Если записей не найдено — пользователь ввёл неверные данные
                {
                    MessageBox.Show("Неверный логин или пароль", "Ошибка", 
                        MessageBoxButtons.OK, MessageBoxIcon.Error);
                    return;
                }

                // Если пользователь найден — открываем главную форму
                OpenMain(dt[0].FullName, dt[0].RoleName);
            }
            catch (Exception ex)
            {
                // Если произошла ошибка (например, нет подключения к БД)

            }
        }

            // Кнопка "Гость" — вход без проверки логина и пароля

        }

            MainForm mf = new MainForm(fullName, roleName);
            
            Hide(); // Скрываем текущую форму Login
            
            // После закрытия MainForm очищаем поле пароля и снова показываем форму Login
            mf.FormClosed += (s, e) => { tbPass.Clear(); Show(); };
            
            mf.Show(); // Показываем главную форму
        }
    }

namespace ObuvApp
{
    public partial class ProductList : UserControl
    {
        private readonly string roleName;
        private bool IsAdmin;
        private bool IsManager;
        private int selectedProductId;

        public ProductList(string roleName)
        {
            InitializeComponent();
            this.roleName = roleName;
        }

        private void ProductList_Load(object sender, EventArgs e)
        {
            IsAdmin = roleName == "Администратор";
            IsManager = roleName == "Менеджер" || IsAdmin;

            pnlTools.Visible = IsManager;
            btnAdd.Visible = IsAdmin;
            btnDel.Visible = IsAdmin;

            try
            {
                productsTableAdapter.Fill(obuvDBDataSet.Products);
                suppliersTableAdapter.Fill(obuvDBDataSet.Suppliers);

                productsBindingSource.DataSource = obuvDBDataSet.Products;

                FillSuppliersCombo();
                cbSort.SelectedIndex = 0;
                ApplyView();
            }
            catch (Exception ex)
            {
                MessageBox.Show("Ошибка подключения:\n" + ex.Message, "Ошибка", MessageBoxButtons.OK, MessageBoxIcon.Error);
            }
        }

        private void FillSuppliersCombo()
        {
            cbSupplier.Items.Clear();
            cbSupplier.Items.Add("Все поставщики");
            foreach (var row in obuvDBDataSet.Suppliers)
                cbSupplier.Items.Add(row.SupplierName);
            cbSupplier.SelectedIndex = 0;
        }

        private void RenderCards()
        {
            pnlCards.Controls.Clear();
            int width = pnlCards.ClientSize.Width - pnlCards.Padding.Horizontal - 20;

            foreach (DataRowView row in productsBindingSource)
            {
                ProductCard card = new ProductCard();
                card.SetData(row);
                card.Width = width;
                card.Margin = new Padding(0, 0, 0, 8);
                card.CardClicked += Card_CardClicked;
                pnlCards.Controls.Add(card);
            }
        }

        private void Card_CardClicked(object sender, EventArgs e)
        {
            selectedProductId = ((ProductCard)sender).ProductId;
            if (!IsAdmin)
            {
                MessageBox.Show("Редактирование доступно только администратору", "Ошибка доступа", MessageBoxButtons.OK, MessageBoxIcon.Information);
                return;
            }
            OpenEdit(selectedProductId);
        }

        private void ViewChanged(object sender, EventArgs e) => ApplyView();

        private void ApplyView()
        {
            string q = tbSearch.Text.Trim().Replace("'", "''");
            string filter = q == "" ? "" : "SearchText LIKE '%" + q + "%'";

            if (cbSupplier.SelectedIndex > 0)
            {
                if (filter != "") filter += " AND ";
                filter += "SupplierName = '" + cbSupplier.Text.Replace("'", "''") + "'";
            }

            productsBindingSource.Filter = filter;
            productsBindingSource.Sort = cbSort.SelectedIndex == 1 ? "StockQty ASC" :
                                         cbSort.SelectedIndex == 2 ? "StockQty DESC" : "";

            RenderCards();
        }

        private void btnAdd_Click(object sender, EventArgs e)
        {
            if (IsAdmin) OpenEdit(null);
        }

        private void btnDel_Click(object sender, EventArgs e)
        {
            if (selectedProductId == 0) { MessageBox.Show("Выберите товар"); return; }

            int used = productsTableAdapter.CountProductInOrders(selectedProductId) ?? 0;
            if (used > 0)
            {
                MessageBox.Show("Нельзя удалить товар, он используется в заказе");
                return;
            }

            try
            {
                productsTableAdapter.DeleteById(selectedProductId);
                selectedProductId = 0;
                productsTableAdapter.Fill(obuvDBDataSet.Products);
                ApplyView();
            }
            catch (Exception ex)
            {
                MessageBox.Show("Ошибка: " + ex.Message, "Ошибка", MessageBoxButtons.OK, MessageBoxIcon.Error);
            }
        }

        private void OpenEdit(int? id)
        {
            using (ProductEdit f = new ProductEdit(id))
                if (f.ShowDialog() == DialogResult.OK)
                {
                    productsTableAdapter.Fill(obuvDBDataSet.Products);
                    ApplyView();
                }
        }
    }

        public ProductEdit(int? id)           // Конструктор формы
        { 
            InitializeComponent();            // Инициализация всех элементов, созданных в дизайнере
            productId = id;                   // Сохраняем ID (null = новый товар)
        }

        private void ProductEdit_Load(object sender, EventArgs e)
        {
            try
            {
                // Загружаем все справочники, которые нужны в ComboBox
                categoriesTableAdapter.Fill(obuvDBDataSet.Categories);
                manufacturersTableAdapter.Fill(obuvDBDataSet.Manufacturers);
                suppliersTableAdapter.Fill(obuvDBDataSet.Suppliers);
                unitsTableAdapter.Fill(obuvDBDataSet.Units);

                // Загружаем таблицу товаров
                productsTableAdapter.Fill(obuvDBDataSet.Products);

                if (productId.HasValue)   // Если редактируем существующий товар
                {
                    // Находим нужную строку в BindingSource
                    productsBindingSource.Position = productsBindingSource.Find("ProductId", productId.Value);
                    tbId.Visible = true;   // Показываем поле с ID
                }
                else   // Если создаём новый товар
                {
                    productsBindingSource.AddNew();   // Создаём новую пустую строку в DataSet
                    tbId.Visible = false;             // Поле ID скрываем
                }

                ShowPhoto();   // Показываем текущее фото (или заглушку)
            }
            catch (Exception ex)
            {
                MessageBox.Show(ex.Message, "Ошибка");
                Close();   // Если ошибка — сразу закрываем форму
            }
        }

        private void ShowPhoto()
        {
            // Берём текущий путь к фото из BindingSource
            var rel = ((DataRowView)productsBindingSource.Current)["PhotoPath"].ToString();
            
            // Если есть новое выбранное фото — используем его, иначе — путь из базы
            var full = pendingSource ?? (rel == "" ? "" : Path.Combine(Application.StartupPath, rel));

            // Если файл существует — загружаем его, иначе — показываем заглушку
            pbPhoto.Image = File.Exists(full)
                ? Image.FromStream(new MemoryStream(File.ReadAllBytes(full)))
                : Properties.Resources.picture;
        }

        {

            {
                pendingSource = openFileDialog.FileName;   // Запоминаем выбранный файл
                ShowPhoto();                               // Сразу показываем его в PictureBox
            }
        }

        private void btnSave_Click(object sender, EventArgs e)
        {
            // Простая валидация полей
            if (tbName.Text.Trim() == "") { MessageBox.Show("Укажите наименование"); return; }
            if (tbArticle.Text.Trim() == "") { MessageBox.Show("Укажите артикул"); return; }
            if (numPrice.Value <= 0) { MessageBox.Show("Цена должна быть больше 0"); return; }

            try
            {
                var row = (DataRowView)productsBindingSource.Current;   // Текущая строка в DataSet

                // Если пользователь выбрал новое фото — обрабатываем его
                if (pendingSource != null)
                {
                    var dir = Path.Combine(Application.StartupPath, "images");   // Папка images рядом с exe
                    Directory.CreateDirectory(dir);                               // Создаём папку, если её нет

                    var rel = "images\\" + Guid.NewGuid().ToString("N") + ".png"; // Уникальное имя файла

                    // Уменьшаем фото до 300x200 и сохраняем как PNG
                    using (var src = Image.FromFile(pendingSource))
                    using (var bmp = new Bitmap(src, 300, 200))
                        bmp.Save(Path.Combine(Application.StartupPath, rel), ImageFormat.Png);

                    // Удаляем старое фото, если оно было
                    var old = row["PhotoPath"].ToString();
                    if (old != "" && File.Exists(Path.Combine(Application.StartupPath, old)))
                        File.Delete(Path.Combine(Application.StartupPath, old));

                    // Записываем новый путь в строку
                    row["PhotoPath"] = rel;
                }

                productsBindingSource.EndEdit();                    // Завершаем редактирование строки
                productsTableAdapter.Update(obuvDBDataSet.Products); // Сохраняем изменения в БД

                DialogResult = DialogResult.OK;   // Сообщаем, что форма закрыта успешно
                Close();
            }
            catch (Exception ex)
            {
                MessageBox.Show(ex.Message, "Ошибка");
            }
        }
